      <line x1="520" y1="300" x2="1080" y2="300"/>
      <line x1="520" y1="2500" x2="1080" y2="2500"/>
      <line x1="960" y1="1760" x2="1260" y2="1760"/>
      <line x1="960" y1="2060" x2="1260" y2="2060"/>
    </g>

