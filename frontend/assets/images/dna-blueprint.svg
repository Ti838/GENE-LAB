<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 2800" role="img" aria-labelledby="title desc">
  <title id="title">DNA Technical Blueprint</title>
  <desc id="desc">Clean blueprint poster of a DNA double helix with technical insets and dimensions.</desc>

  <defs>
    <pattern id="grid-minor" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#1d4a8c" stroke-width="1" vector-effect="non-scaling-stroke"/>
    </pattern>
    <pattern id="grid-major" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M120 0H0V120" fill="none" stroke="#3b66a5" stroke-width="1.3" vector-effect="non-scaling-stroke"/>
    </pattern>
  </defs>

  <g id="background">
    <rect x="0" y="0" width="2000" height="2800" fill="#0b438f"/>
    <rect x="0" y="0" width="2000" height="2800" fill="url(#grid-minor)"/>
    <rect x="0" y="0" width="2000" height="2800" fill="url(#grid-major)"/>
    <rect x="28" y="28" width="1944" height="2744" fill="none" stroke="#ffffff" stroke-width="2.2" vector-effect="non-scaling-stroke"/>
  </g>

  <g id="title-block" fill="#ffffff" font-family="'JetBrains Mono', monospace" letter-spacing="1.4">
