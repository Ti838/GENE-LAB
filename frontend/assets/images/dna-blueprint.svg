    <text x="122" y="2390" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="34">SPECIFICATIONS</text>
    <text x="122" y="2460" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="29">DIAMETER      : 2.0 nm</text>
    <text x="122" y="2508" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="29">PITCH         : 3.4 nm</text>
    <text x="122" y="2556" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="29">BASE PAIRS    : 10 / TURN</text>
    <text x="122" y="2604" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="29">TOTAL LENGTH  : 34.0 nm</text>
    <text x="122" y="2652" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="29">STRUCTURE     : DOUBLE HELIX</text>
    <text x="122" y="2700" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="29">TYPE          : RIGHT-HANDED (B-DNA)</text>
